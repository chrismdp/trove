# Release — tag-triggered cross-platform release.
#
# Tag `v0.2.0` produces:
#   trove-0.2.0-linux-amd64.tar.gz   (+ .sha256)
#   trove-0.2.0-linux-arm64.tar.gz   (+ .sha256)
#   trove-0.2.0-macos-arm64.tar.gz   (+ .sha256)
# (Intel Macs are not shipped — Apple Silicon only.)
#
# Each tarball contains `trove`, the matching `libjfs-<arch>.{so,dylib}`,
# LICENSE.md and README.md. The relocatable rpath in build.rs ($ORIGIN /
# @loader_path) makes the binary find libjfs alongside it at runtime.
name: release

on:
  push:
    tags: ['v*.*.*']

jobs:
  build:
    name: build-${{ matrix.os_label }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            os_label: linux
            arch: amd64
            libjfs_file: libjfs-amd64.so
          - runner: ubuntu-22.04-arm
            os_label: linux
            arch: arm64
            libjfs_file: libjfs-arm64.so
          # Intel Macs (x86_64) are not shipped — Apple Silicon (arm64) only.
          # See docs/packaging.md for the rationale.
          - runner: macos-14
            os_label: macos
            arch: arm64
            libjfs_file: libjfs-arm64.dylib
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - uses: dtolnay/rust-toolchain@stable

      - name: Install platform deps (linux)
        if: matrix.os_label == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y fuse3 libfuse3-dev pkg-config

      - name: Install platform deps (macos)
        if: matrix.os_label == 'macos'
        # Diagnostic cycle: show what brew cask install actually does on
        # macos-14 runners. macFUSE KEXT needs kernel consent (impossible
        # headless), but we only need userland (headers + dylib + .pc) to
        # build. Letting brew failures surface — no `|| true` swallowing.
        run: |
          set -x
          echo "::group::pkg-config baseline"
          which pkg-config && pkg-config --version
          echo "PKG_CONFIG_PATH default: $(pkg-config --variable=pc_path pkg-config)"
          echo "::endgroup::"

          echo "::group::brew install pkg-config"
          brew install pkg-config
          echo "::endgroup::"

          echo "::group::brew install --cask macfuse"
          # Don't swallow errors — we need to see what brew actually does
          brew install --cask --no-quarantine macfuse 2>&1 || echo "EXIT=$?"
          echo "::endgroup::"

          echo "::group::find macFUSE artefacts"
          find /usr/local /opt/homebrew /Library/Frameworks /Library/Filesystems -maxdepth 8 \( -name 'osxfuse.pc' -o -name 'fuse.pc' -o -name 'libfuse*.dylib' -o -name 'libosxfuse*.dylib' -o -name 'fuse.h' -o -name 'osxfuse.h' \) 2>/dev/null || true
          echo "::endgroup::"

          echo "::group::macFUSE framework contents"
          ls -la /Library/Frameworks/macFUSE.framework/ 2>&1 || echo "no macFUSE.framework"
          ls -la /Library/Frameworks/macFUSE.framework/Versions/A/ 2>&1 || true
          ls -la /Library/Frameworks/macFUSE.framework/Versions/A/Headers/ 2>&1 || true
          echo "::endgroup::"

          echo "::group::pkg-config lookup"
          pkg-config --cflags --libs fuse 2>&1 || echo "fuse lookup failed (expected on first cycle)"
          echo "::endgroup::"

      - name: Build libjfs
        run: |
          ./libjfs/build.sh
          ls -la "libjfs/build/${{ matrix.libjfs_file }}"

      - name: cargo build --release --features mount
        env:
          LIBJFS_DIR: ${{ github.workspace }}/libjfs/build
        run: cargo build --release --features mount

      - name: Compute version
        id: version
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tarball=trove-${version}-${{ matrix.os_label }}-${{ matrix.arch }}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Package
        shell: bash
        env:
          TARBALL: ${{ steps.version.outputs.tarball }}
          LIBJFS_FILE: ${{ matrix.libjfs_file }}
        run: |
          set -eu
          staging="dist/staging"
          out="dist/out"
          mkdir -p "$staging" "$out"
          cp target/release/trove "$staging/trove"
          cp "libjfs/build/${LIBJFS_FILE}" "$staging/${LIBJFS_FILE}"
          cp LICENSE.md "$staging/LICENSE.md"
          cp README.md "$staging/README.md"
          chmod +x "$staging/trove"
          tar -C "$staging" -czf "$out/${TARBALL}" .
          # Portable sha256 (sha256sum on linux, shasum on macos).
          cd "$out"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${TARBALL}" > "${TARBALL}.sha256"
          else
            shasum -a 256 "${TARBALL}" > "${TARBALL}.sha256"
          fi
          ls -la

      - name: Upload artefact
        uses: actions/upload-artifact@v4
        with:
          name: trove-${{ matrix.os_label }}-${{ matrix.arch }}
          path: |
            dist/out/${{ steps.version.outputs.tarball }}
            dist/out/${{ steps.version.outputs.tarball }}.sha256
          if-no-files-found: error
          retention-days: 7

  release:
    name: publish
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artefacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List release assets
        run: ls -la dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
