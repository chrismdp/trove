# Release — tag-triggered cross-platform release.
#
# Tag `v0.2.0` produces:
#   trove-0.2.0-linux-amd64.tar.gz   (+ .sha256)
#   trove-0.2.0-linux-arm64.tar.gz   (+ .sha256)
#   trove-0.2.0-macos-arm64.tar.gz   (+ .sha256)
# (Intel Macs are not shipped — Apple Silicon only.)
#
# Each tarball contains `trove`, the matching `libjfs-<arch>.{so,dylib}`,
# LICENSE.md, README.md and THIRD-PARTY-LICENSES.md (Apache 2.0 attribution for
# the bundled JuiceFS + every statically-linked Go dep — generated by
# libjfs/build.sh). The relocatable rpath in build.rs ($ORIGIN / @loader_path)
# makes the binary find libjfs alongside it at runtime.
name: release

on:
  push:
    tags: ['v*.*.*']

jobs:
  # Gate: wait for the existing ci.yml + e2e.yml checks on THIS commit to pass
  # before building or publishing — we don't re-run them. The tag sits on the
  # same commit the push to main already tested, so we just wait on its checks.
  # NB: the version bump must live in the substantive commit (not a separate
  # `chore(release):` commit), so the tagged commit has real CI to wait on — see
  # docs/contributing.md. The check names below mirror ci.yml's job names + the
  # e2e job; update them together if the CI matrix changes.
  wait-for-green:
    name: require ${{ matrix.check }} green
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: true
      matrix:
        check: [linux-amd64, linux-arm64, macos-arm64, e2e]
    steps:
      - name: Wait for ${{ matrix.check }} on ${{ github.sha }}
        uses: lewagon/wait-on-check-action@v1.7.0
        with:
          ref: ${{ github.sha }}
          check-name: ${{ matrix.check }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 20
          allowed-conclusions: success

  build:
    needs: [wait-for-green]
    name: build-${{ matrix.os_label }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            os_label: linux
            arch: amd64
            libjfs_file: libjfs-amd64.so
          - runner: ubuntu-22.04-arm
            os_label: linux
            arch: arm64
            libjfs_file: libjfs-arm64.so
          # Intel Macs (x86_64) are not shipped — Apple Silicon (arm64) only.
          # See docs/packaging.md for the rationale.
          - runner: macos-14
            os_label: macos
            arch: arm64
            libjfs_file: libjfs-arm64.dylib
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - uses: dtolnay/rust-toolchain@stable

      - name: Install platform deps (linux)
        if: matrix.os_label == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y fuse3 libfuse3-dev pkg-config

      - name: Install platform deps (macos)
        if: matrix.os_label == 'macos'
        # macFUSE userland (headers + dylib + pkg-config) is required for
        # the `fuser` crate to link. We don't need the KEXT (kernel-side)
        # to compile, only userland. Note: `--no-quarantine` was disabled
        # in recent Homebrew releases and aborts the install — so don't
        # pass it. macFUSE installs to /Library/Frameworks/macFUSE.framework/
        # and stages a .pc file under /usr/local/lib/pkgconfig/.
        run: |
          set -x
          echo "::group::brew install pkg-config + macfuse"
          brew install pkg-config
          brew install --cask macfuse 2>&1 | tail -50 || { echo "EXIT=$?"; exit 1; }
          echo "::endgroup::"

          echo "::group::find macFUSE artefacts"
          find /usr/local /opt/homebrew /Library/Frameworks /Library/Filesystems -maxdepth 8 \( -name 'osxfuse.pc' -o -name 'fuse.pc' -o -name 'libfuse*.dylib' -o -name 'libosxfuse*.dylib' -o -name 'fuse.h' -o -name 'osxfuse.h' \) 2>/dev/null || true
          echo "::endgroup::"

          echo "::group::macFUSE framework contents"
          ls -la /Library/Frameworks/macFUSE.framework/ 2>&1 || echo "no macFUSE.framework"
          ls -la /Library/Frameworks/macFUSE.framework/Versions/A/ 2>&1 || true
          ls -la /Library/Frameworks/macFUSE.framework/Versions/A/Headers/ 2>&1 || true
          echo "::endgroup::"

          echo "::group::confirm fuse.pc"
          # macFUSE 4.x's installer DOES ship /usr/local/lib/pkgconfig/fuse.pc
          # plus /usr/local/lib/libfuse.2.dylib (the libfuse2-compatible userland
          # that fuser 0.17 links against). Older docs say macFUSE 4 ships
          # only osxfuse.pc — that's no longer true. Just confirm fuse.pc
          # exists and dump it for the log; don't overwrite it.
          if [ -f /usr/local/lib/pkgconfig/fuse.pc ]; then
            echo "Found /usr/local/lib/pkgconfig/fuse.pc:"
            cat /usr/local/lib/pkgconfig/fuse.pc
          else
            echo "ERROR: /usr/local/lib/pkgconfig/fuse.pc not present after macFUSE cask install"
            ls -la /usr/local/lib/pkgconfig/ || true
            exit 1
          fi
          echo "::endgroup::"

          echo "::group::verify pkg-config fuse"
          # macFUSE installs to /usr/local/lib/pkgconfig but pkg-config from
          # /opt/homebrew may not search there by default. Prepend explicitly.
          export PKG_CONFIG_PATH="/usr/local/lib/pkgconfig:${PKG_CONFIG_PATH}"
          pkg-config --cflags --libs fuse
          echo "PKG_CONFIG_PATH=/usr/local/lib/pkgconfig:\$PKG_CONFIG_PATH" >> "$GITHUB_ENV"
          echo "::endgroup::"

      - name: Build libjfs
        run: |
          ./libjfs/build.sh
          ls -la "libjfs/build/${{ matrix.libjfs_file }}"

      - name: cargo build --release --features mount
        env:
          LIBJFS_DIR: ${{ github.workspace }}/libjfs/build
        run: cargo build --release --features mount

      - name: Patch macOS dylib install names
        if: matrix.os_label == 'macos'
        # JuiceFS's libjfs-arm64.dylib ships with install name = the bare
        # filename ("libjfs-arm64.dylib"), no @rpath/@loader_path prefix.
        # rustc copies that literal into trove's LC_LOAD_DYLIB command, so at
        # runtime dyld goes straight to absolute / CWD search and never
        # consults the @loader_path rpath that build.rs set — the dylib next
        # to the binary in the tarball can't be found. Patch both sides:
        # give the dylib a proper @rpath-prefixed id, and rewrite trove's
        # load command to match. Re-codesign afterwards (install_name_tool
        # invalidates the existing signature). Verify with otool.
        env:
          LIBJFS_FILE: ${{ matrix.libjfs_file }}
        run: |
          set -eu
          DYLIB="libjfs/build/${LIBJFS_FILE}"
          BIN="target/release/trove"
          install_name_tool -id "@rpath/${LIBJFS_FILE}" "$DYLIB"
          install_name_tool -change "${LIBJFS_FILE}" "@rpath/${LIBJFS_FILE}" "$BIN"
          codesign --force --sign - "$DYLIB"
          codesign --force --sign - "$BIN"
          echo "::group::otool -L target/release/trove"
          otool -L "$BIN" | grep -E "libjfs|@rpath" || true
          echo "::endgroup::"

      - name: Compute version
        id: version
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tarball=trove-${version}-${{ matrix.os_label }}-${{ matrix.arch }}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Package
        shell: bash
        env:
          TARBALL: ${{ steps.version.outputs.tarball }}
          LIBJFS_FILE: ${{ matrix.libjfs_file }}
        run: |
          set -eu
          staging="dist/staging"
          out="dist/out"
          mkdir -p "$staging" "$out"
          cp target/release/trove "$staging/trove"
          cp "libjfs/build/${LIBJFS_FILE}" "$staging/${LIBJFS_FILE}"
          cp LICENSE.md "$staging/LICENSE.md"
          cp README.md "$staging/README.md"
          # Third-party attribution for the bundled JuiceFS + Go deps. Generated
          # by libjfs/build.sh; a missing file means the build was incomplete,
          # so fail loudly rather than ship a non-compliant tarball.
          cp "libjfs/build/THIRD-PARTY-LICENSES.md" "$staging/THIRD-PARTY-LICENSES.md"
          chmod +x "$staging/trove"
          tar -C "$staging" -czf "$out/${TARBALL}" .
          # Portable sha256 (sha256sum on linux, shasum on macos).
          cd "$out"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${TARBALL}" > "${TARBALL}.sha256"
          else
            shasum -a 256 "${TARBALL}" > "${TARBALL}.sha256"
          fi
          ls -la

      - name: Upload artefact
        uses: actions/upload-artifact@v4
        with:
          name: trove-${{ matrix.os_label }}-${{ matrix.arch }}
          path: |
            dist/out/${{ steps.version.outputs.tarball }}
            dist/out/${{ steps.version.outputs.tarball }}.sha256
          if-no-files-found: error
          retention-days: 7

  release:
    name: publish
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artefacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List release assets
        run: ls -la dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
