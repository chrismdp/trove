# Release — tag-triggered cross-platform release.
#
# Tag `v0.2.0` produces:
#   trove-0.2.0-linux-amd64.tar.gz   (+ .sha256)
#   trove-0.2.0-linux-arm64.tar.gz   (+ .sha256)
#   trove-0.2.0-macos-arm64.tar.gz   (+ .sha256)
# (Intel Macs are not shipped — Apple Silicon only.)
#
# Each tarball contains `trove`, the matching `libjfs-<arch>.{so,dylib}`,
# LICENSE.md and README.md. The relocatable rpath in build.rs ($ORIGIN /
# @loader_path) makes the binary find libjfs alongside it at runtime.
name: release

on:
  push:
    tags: ['v*.*.*']

jobs:
  build:
    name: build-${{ matrix.os_label }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            os_label: linux
            arch: amd64
            libjfs_file: libjfs-amd64.so
          - runner: ubuntu-22.04-arm
            os_label: linux
            arch: arm64
            libjfs_file: libjfs-arm64.so
          # Intel Macs (x86_64) are not shipped — Apple Silicon (arm64) only.
          # See docs/packaging.md for the rationale.
          - runner: macos-14
            os_label: macos
            arch: arm64
            libjfs_file: libjfs-arm64.dylib
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - uses: dtolnay/rust-toolchain@stable

      - name: Install platform deps (linux)
        if: matrix.os_label == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y fuse3 libfuse3-dev pkg-config

      - name: Install platform deps (macos)
        if: matrix.os_label == 'macos'
        # macFUSE userland (headers + dylib + pkg-config) is required for
        # `fuser` to link. The KEXT half of macFUSE needs kernel-extension
        # consent — not possible in headless GHA — but we don't need to
        # actually mount, only to compile/link. macFUSE 4.x ships
        # `osxfuse.pc` but NOT `fuse.pc`; we symlink so `fuser`'s
        # pkg-config lookup succeeds.
        run: |
          brew install pkg-config || true
          brew install --cask --no-quarantine macfuse || true
          osxfuse_pc=$(find /usr/local /opt/homebrew /Library/Frameworks/macFUSE.framework -name 'osxfuse.pc' 2>/dev/null | head -1)
          if [ -n "$osxfuse_pc" ]; then
            sudo ln -sf "$osxfuse_pc" "$(dirname "$osxfuse_pc")/fuse.pc"
            echo "Symlinked fuse.pc -> $osxfuse_pc"
          else
            echo "warning: osxfuse.pc not found after macFUSE install"
          fi
          pkg-config --cflags --libs fuse || echo "warning: pkg-config fuse still failing"

      - name: Build libjfs
        run: |
          ./libjfs/build.sh
          ls -la "libjfs/build/${{ matrix.libjfs_file }}"

      - name: cargo build --release --features mount
        env:
          LIBJFS_DIR: ${{ github.workspace }}/libjfs/build
        run: cargo build --release --features mount

      - name: Compute version
        id: version
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tarball=trove-${version}-${{ matrix.os_label }}-${{ matrix.arch }}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Package
        shell: bash
        env:
          TARBALL: ${{ steps.version.outputs.tarball }}
          LIBJFS_FILE: ${{ matrix.libjfs_file }}
        run: |
          set -eu
          staging="dist/staging"
          out="dist/out"
          mkdir -p "$staging" "$out"
          cp target/release/trove "$staging/trove"
          cp "libjfs/build/${LIBJFS_FILE}" "$staging/${LIBJFS_FILE}"
          cp LICENSE.md "$staging/LICENSE.md"
          cp README.md "$staging/README.md"
          chmod +x "$staging/trove"
          tar -C "$staging" -czf "$out/${TARBALL}" .
          # Portable sha256 (sha256sum on linux, shasum on macos).
          cd "$out"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${TARBALL}" > "${TARBALL}.sha256"
          else
            shasum -a 256 "${TARBALL}" > "${TARBALL}.sha256"
          fi
          ls -la

      - name: Upload artefact
        uses: actions/upload-artifact@v4
        with:
          name: trove-${{ matrix.os_label }}-${{ matrix.arch }}
          path: |
            dist/out/${{ steps.version.outputs.tarball }}
            dist/out/${{ steps.version.outputs.tarball }}.sha256
          if-no-files-found: error
          retention-days: 7

  release:
    name: publish
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artefacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List release assets
        run: ls -la dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
