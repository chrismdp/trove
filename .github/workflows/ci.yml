# CI — build + lib tests on push/PR across the four supported targets.
#
# Integration tests (tests/*.rs that exercise live Postgres / R2 / OpenAI
# or require /dev/fuse) are intentionally NOT run here. CI proves the
# code compiles and unit/lib tests pass; end-to-end coverage is the
# developer's responsibility before tagging a release.
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: ${{ matrix.os_label }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            os_label: linux
            arch: amd64
            libjfs_file: libjfs-amd64.so
          - runner: ubuntu-22.04-arm
            os_label: linux
            arch: arm64
            libjfs_file: libjfs-arm64.so
          # Intel Macs (x86_64) are not supported — the GH-hosted macos-13
          # runner is being deprecated and the Intel Mac population is small
          # and shrinking. Apple Silicon (arm64) only. See docs/packaging.md.
          - runner: macos-14
            os_label: macos
            arch: arm64
            libjfs_file: libjfs-arm64.dylib
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo + libjfs build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            libjfs/build
          key: ${{ matrix.os_label }}-${{ matrix.arch }}-libjfs-${{ hashFiles('libjfs/build.sh', 'libjfs/patches/**') }}
          restore-keys: |
            ${{ matrix.os_label }}-${{ matrix.arch }}-libjfs-

      - name: Install platform deps (linux)
        if: matrix.os_label == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y fuse3 libfuse3-dev pkg-config

      - name: Install platform deps (macos)
        if: matrix.os_label == 'macos'
        # See release.yml for full rationale. `--no-quarantine` is no longer
        # accepted by Homebrew and aborts the cask install when present.
        run: |
          set -x
          echo "::group::brew install pkg-config + macfuse"
          brew install pkg-config
          brew install --cask macfuse 2>&1 | tail -50 || { echo "EXIT=$?"; exit 1; }
          echo "::endgroup::"

          echo "::group::find macFUSE artefacts"
          find /usr/local /opt/homebrew /Library/Frameworks /Library/Filesystems -maxdepth 8 \( -name 'osxfuse.pc' -o -name 'fuse.pc' -o -name 'libfuse*.dylib' -o -name 'libosxfuse*.dylib' -o -name 'fuse.h' -o -name 'osxfuse.h' \) 2>/dev/null || true
          echo "::endgroup::"

          echo "::group::link fuse.pc into pkg-config path"
          osxfuse_pc=$(find /usr/local /opt/homebrew /Library/Frameworks/macFUSE.framework -name 'osxfuse.pc' 2>/dev/null | head -1)
          if [ -n "$osxfuse_pc" ]; then
            target_dir="$(dirname "$osxfuse_pc")"
            sudo ln -sf "$osxfuse_pc" "$target_dir/fuse.pc"
            echo "Symlinked $target_dir/fuse.pc -> $osxfuse_pc"
          elif [ -d /Library/Frameworks/macFUSE.framework ]; then
            echo "No osxfuse.pc found — synthesising fuse.pc against framework"
            sudo mkdir -p /usr/local/lib/pkgconfig
            sudo tee /usr/local/lib/pkgconfig/fuse.pc >/dev/null <<'PC'
Name: fuse
Description: macFUSE userland (synthesised against /Library/Frameworks/macFUSE.framework)
Version: 4.8.3
Libs: -F/Library/Frameworks -framework macFUSE
Cflags: -I/Library/Frameworks/macFUSE.framework/Versions/A/Headers -D_FILE_OFFSET_BITS=64 -DFUSE_USE_VERSION=29
PC
            echo "Wrote /usr/local/lib/pkgconfig/fuse.pc"
          else
            echo "ERROR: macFUSE not installed anywhere we can find"
            exit 1
          fi
          echo "::endgroup::"

          echo "::group::verify pkg-config fuse"
          pkg-config --cflags --libs fuse
          echo "::endgroup::"

      - name: Build libjfs
        run: |
          ./libjfs/build.sh
          ls -la "libjfs/build/${{ matrix.libjfs_file }}"

      - name: cargo check (core)
        run: cargo check

      - name: cargo check (mount feature)
        env:
          LIBJFS_DIR: ${{ github.workspace }}/libjfs/build
        run: cargo check --features mount

      - name: cargo build --release --features mount
        env:
          LIBJFS_DIR: ${{ github.workspace }}/libjfs/build
        run: cargo build --release --features mount

      - name: cargo test --lib (core)
        run: cargo test --lib

      - name: cargo test --features mount --lib
        env:
          LIBJFS_DIR: ${{ github.workspace }}/libjfs/build
        # Lib tests only — integration tests in tests/ require live
        # Postgres / R2 / OpenAI / /dev/fuse and aren't run on CI.
        run: cargo test --features mount --lib
